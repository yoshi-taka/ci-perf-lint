pre-commit:
  commands:
    format:
      glob: "{src,test}/*.ts"
      run: bun run format
    lint-and-audit:
      glob: "{src,test}/*.ts"
      run: oxlint --type-aware --type-check --fix {staged_files} && bun run audit:static
    config-audit:
      glob: "{knip.json,.fallowrc.json}"
      run: bun run audit:static
