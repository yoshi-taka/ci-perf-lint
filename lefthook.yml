pre-commit:
  commands:
    format:
      glob: "{src,test}/*.ts"
      run: bun run format
    lint:
      glob: "{src,test}/*.ts"
      run: bun run lint
    audit-static:
      glob: "{src,test}/*.ts"
      run: bun run audit:static
    config-audit:
      glob: "{knip.json,.fallowrc.json}"
      run: bun run audit:static
