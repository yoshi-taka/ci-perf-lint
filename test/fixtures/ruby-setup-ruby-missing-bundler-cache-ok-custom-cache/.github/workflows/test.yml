name: Rails CI
on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: bundle-${{ hashFiles('Gemfile.lock') }}
      - run: bundle install
      - run: bundle exec rspec
