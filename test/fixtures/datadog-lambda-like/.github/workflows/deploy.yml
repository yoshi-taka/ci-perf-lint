name: Deploy Lambda
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: DataDog/datadog-lambda-extension@v86
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
