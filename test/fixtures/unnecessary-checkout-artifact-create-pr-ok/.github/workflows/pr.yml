name: Sync Files

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -s https://example.com/data.json > data.json
      - uses: peter-evans/create-pull-request@v6
        with:
          title: "Auto update data"
