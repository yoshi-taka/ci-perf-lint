name: CI
on: push
jobs:
  lint:
    strategy:
      matrix:
        package: [app, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx eslint .
  lint_more:
    strategy:
      matrix:
        package: [app, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx eslint .
