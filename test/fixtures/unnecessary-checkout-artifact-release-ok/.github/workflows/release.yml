name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: rm -rf sqlpage/templates/*.handlebars
      - run: cp sqlpage/sqlpage.json dist/
      - run: tar czf release.tar.gz sqlpage/migrations sqlpage/templates
      - uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: release.tar.gz
