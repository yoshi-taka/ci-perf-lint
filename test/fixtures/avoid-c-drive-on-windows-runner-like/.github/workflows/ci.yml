name: CI
on: push
jobs:
  build:
    runs-on: windows-latest
    env:
      TEMP: C:\temp
    defaults:
      run:
        working-directory: C:\build
    steps:
      - uses: actions/checkout@v4
        with:
          path: C:\checkout
      - run: echo build
        working-directory: C:\build
        env:
          TMP: C:\tmp
