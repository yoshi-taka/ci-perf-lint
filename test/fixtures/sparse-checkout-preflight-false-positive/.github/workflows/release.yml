name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bun
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: ./scripts/resolve-nightly-release.ts
      - run: ./scripts/resolve-previous-release-tag.ts
