name: release notes

on:
  push:
    tags:
      - "v*"

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            .github
            scripts
      - name: Generate release notes
        run: git describe --tags --always && gh release view "$GITHUB_REF_NAME" --json tagName
      - uses: softprops/action-gh-release@v2
        with:
          body: Generated notes
