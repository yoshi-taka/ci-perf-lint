name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build

  beta:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "optional beta publish"

  publish:
    needs:
      - build
      - beta
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: npm publish
