name: docker

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag example/test:latest \
            --push .
