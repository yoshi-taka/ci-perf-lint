name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git describe --tags --always > packages/opencode/dist/version.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cli
          path: packages/opencode/dist/*
