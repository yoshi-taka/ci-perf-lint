name: test

on:
  pull_request:

jobs:
  shard_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npx jest --runInBand --shard=${{ matrix.shard }}
