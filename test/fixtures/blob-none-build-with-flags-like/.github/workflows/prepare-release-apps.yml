name: Prepare Release Apps

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild NAPI bindings
        run: |
          pnpm --filter oxlint-app run build-dev
          pnpm --filter oxfmt-app run build-dev
      - name: Update Cargo.lock
        run: cargo ck
