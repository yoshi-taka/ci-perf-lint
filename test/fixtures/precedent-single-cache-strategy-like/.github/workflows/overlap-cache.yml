name: overlap-cache
on:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache
      - run: npm ci
