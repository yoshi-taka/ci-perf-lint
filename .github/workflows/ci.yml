name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Install dependencies
        run: bun install --frozen-lockfile --minimum-release-age 0

      - name: Lint
        run: bun run lint

      - name: Static audit
        run: bun run audit:static

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Self-audit workflows
        run: bun run dist/cli.js . --workflow-only --format text
