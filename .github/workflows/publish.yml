name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - latest
      bump_version:
        description: bump package versions before publish
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install system deps
        run: sudo apt-get install -y -qq ripgrep

      - name: Install dependencies
        run: bun install --frozen-lockfile --minimum-release-age 0

      - name: Verify
        run: |
          bun run lint
          bun run audit:static
          bun test --parallel
          bun run build
          bun run src/cli.ts . --workflow-only --format text

      - name: Bump publish version
        if: github.event_name == 'workflow_dispatch' && inputs.bump_version
        run: |
          if [ "${{ inputs.dist_tag }}" = "alpha" ]; then
            npm version prerelease --preid=alpha --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi
          VERSION="$(node -p "require('./package.json').version")"
          npm pkg set version="$VERSION" dependencies.@yoshi-taka/ci-perf-lint="$VERSION" -w packages/ci-perf-lint

      - name: Resolve publish metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            DIST_TAG="${{ inputs.dist_tag }}"
          elif [[ "$VERSION" == *-* ]]; then
            DIST_TAG="alpha"
          else
            DIST_TAG="latest"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish scoped package
        run: npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}"

      - name: Publish unscoped package
        run: npm publish -w packages/ci-perf-lint --tag "${{ steps.meta.outputs.dist_tag }}"

      - name: Create GitHub Release
        if: github.event_name == 'push' && !contains(github.ref_name, '-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
